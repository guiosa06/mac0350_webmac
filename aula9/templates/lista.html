<input type="text"  
       placeholder="Buscar..."
       hx-get="/lista/?index=0"
       hx-target="#lista"
       hx-trigger="input changed delay:500ms"
       hx-select="#lista"
       name="busca">
<div id="lista">
    <ul>
        {% for aluno in alunos %}
            <li>{{ aluno.id }} {{ aluno.nome }}</li>
        {% else %}
            <li>Não há alunos</li>
        {% endfor %}
    </ul>
</div>
<button hx-get="/lista/?index={{ index - 1 }}">Anterior</button>
<button hx-get="/lista/?index={{ index + 1 }}">Próximo</button>
